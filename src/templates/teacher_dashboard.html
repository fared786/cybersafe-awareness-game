<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card wide-card">
            <h1>Teacher Dashboard</h1>
            <p class="subtitle">Student progress monitoring panel.</p>

            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for username, data in users.items() %}
                    <tr>
                        <td>{{ username }}</td>
                        <td>{{ data.role }}</td>
                        <td>{{ data.score }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <a class="logout-link" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
</body>
</html>
